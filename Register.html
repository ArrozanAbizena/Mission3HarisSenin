<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link href="./css/output.css" rel="stylesheet">
    <link href="./css/components/navigation.css" rel="stylesheet">
    <link href="./css/typography.css" rel="stylesheet">
    <link href="./css/variables.css" rel="stylesheet">
    <link href="./css/components/button.css" rel="stylesheet">
    <link href="./css/components/card.css" rel="stylesheet">
    <title>VideoBelajar</title>
    <link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
/>
</head>
<body>
    <nav class="navigation navigation--login navigation--profile">
        <img src="./css/logo.svg" alt="VideoBelajar" class="navigation__logo" />
    </nav>

    <main class="LoginPage" style="display:flex;justify-content:center;align-items:center;min-height:calc(100vh - 80px);background:var(--secondary-color-100);">
      <section
        style="
        width:590px;
        padding:36px;
        background:#FFFFFF;
        border:1px solid #F1F1F1;
        border-radius:4px;"
      >               
    <h1 class="h3" style="text-align:center; margin-bottom:8px;"> Masuk ke Akun </h1>
    <p style="text-align:center; color:#6B7280;margin-bottom:36px;">
      Yuk, lanjutin belajarmu di videobelajar.
    </p>
    <form>
    <label>Nama Lengkap <span style="color: var(--error-default)">*</span>
    <input
      type="text"
      placeholder="Masukkan nama lengkap"
      style="
        width:100%;
        padding:12px;
        border:1px solid #D1D5DB;
        border-radius:6px;
        margin-top:8px;
        margin-bottom:16px;
        box-sizing:border-box;"
    >
  </label>
    <label>E-Mail <span style="color: var(--error-default)">*</span>
    <input
      type="email"
      placeholder="Masukkan email"
      style="
        width:100%;
        padding:12px;
        border:1px solid #D1D5DB;
        border-radius:6px;
        margin-top:8px;
        margin-bottom:16px;
        box-sizing:border-box;"
    >
  </label>
  <label>Jenis Kelamin <span style="color: var(--error-default)">*</span>
  <select id="gender" name="gender" style="
        width:100%;
        padding:12px;
        border:1px solid #D1D5DB;
        border-radius:6px;
        margin-top:8px;
        margin-bottom:16px;
        box-sizing:border-box;"
  >
  <option value="">Pilih Jenis Kelamin</option>
  <option value="laki-laki">Laki-laki</option>
  <option value="perempuan">Wanita</option>
</select>
  </label>

<div style="flex:0 0 190px; position:relative;">
  <select
    id="countryCode"
    style="
      width:100%;
      height:56px;
      padding:0 40px 0 60px;
      border:1px solid #D1D5DB;
      border-radius:8px;
      appearance:none;
      -webkit-appearance:none;
      background:#fff;
      font-size:16px;
      cursor:pointer;
    "
  >
    <option value="+62">+62</option>
    <option value="+60">+60</option>
    <option value="+65">+65</option>
  </select>

  <!-- Bendera -->
  <span
    style="
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      font-size:22px;
      pointer-events:none;
    "
  >
    🇮🇩
  </span>

  <!-- Icon panah -->
  <span
    class="material-symbols-outlined"
    style="
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      color:#666;
      pointer-events:none;
    "
  >
    expand_more
  </span>
</div>

   <label>Kata Sandi <span style="color: var(--error-default)">*</span></label>
   <div style="position:relative;margin-top:8px;margin-bottom:16px;">
     <input
       id="password"
       type="password"
       placeholder="Masukkan kata sandi"
       style="
         width:100%;
         padding:12px;
         border:1px solid #D1D5DB;
         border-radius:6px;
         box-sizing:border-box;"
     >
     <button
       type="button"
       class="btn"
       id="togglePassword"
       aria-label="Lihat kata sandi"
       style="
         position:absolute;
         right:10px;
         top:50%;
         transform:translateY(-50%);
         width:36px;
         height:36px;
         border-radius:999px;
         background:#F5F5F5;
         border:1px solid #D1D5DB;
         cursor:pointer;"
     >
       <span
  id="togglePasswordIcon"
  class="material-symbols-outlined"
>
visibility_off
</span>
     </button>
   </div>

   <label>Konfirmasi Kata Sandi <span style="color: var(--error-default)">*</span></label>
   <div style="position:relative;margin-top:8px;margin-bottom:16px;">
     <input
       id="confirmPassword"
       type="password"
       placeholder="Konfirmasi kata sandi"
       style="
         width:100%;
         padding:12px;
         border:1px solid #D1D5DB;
         border-radius:6px;
         box-sizing:border-box;"
     >
     <button
       type="button"
       class="btn"
       id="toggleConfirmPassword"
       aria-label="Lihat konfirmasi kata sandi"
       style="
         position:absolute;
         right:10px;
         top:50%;
         transform:translateY(-50%);
         width:36px;
         height:36px;
         border-radius:999px;
         background:#F5F5F5;
         border:1px solid #D1D5DB;
         cursor:pointer;"
     >
             <span id="toggleConfirmPasswordIcon" class="material-symbols-outlined"> visibility_off </span>
     </button>
   </div>
  </form>
  <button class="btn btn-primary btn-contained"
    style="
      width:100%;
      height:42px;
      margin-bottom:12px;"
  >
    Daftar
  </button>
  <a href="./index.html" style="text-decoration:none;">
  <button class="btn btn-secondary btn-shadow"
    style="
      width:100%;
      height:42px;
      margin-bottom:24px;"
  >
    Masuk
  </button>
  </a>
  <button class="btn-google">
  <img src="./logoGoogle.svg" alt="Google" style="width:20px;height:20px;margin-right:8px;">

  <span>Masuk dengan Google</span>
</button>

<script>
  (function () {
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const toggleConfirmPasswordBtn = document.getElementById('toggleConfirmPassword');

    const bindToggle = (inputEl, buttonEl, iconEl) => {
      const state = { shown: false };

      const setShown = (shown) => {
        state.shown = shown;
        inputEl.type = shown ? 'text' : 'password';
        if (iconEl) {
    iconEl.textContent = shown
        ? 'visibility_off'
        : 'visibility';
}
      };

      buttonEl.addEventListener('click', () => {
        setShown(!state.shown);
      });

      // default: hidden (password)
      setShown(false);
    };

    const togglePasswordIcon = document.getElementById('togglePasswordIcon');
    const toggleConfirmPasswordIcon = document.getElementById('toggleConfirmPasswordIcon');

    if (passwordInput && togglePasswordBtn) bindToggle(passwordInput, togglePasswordBtn, togglePasswordIcon);
    if (confirmPasswordInput && toggleConfirmPasswordBtn) bindToggle(confirmPasswordInput, toggleConfirmPasswordBtn, toggleConfirmPasswordIcon);
  })();
</script>
</section>  
    </main>
</body>
</html>
