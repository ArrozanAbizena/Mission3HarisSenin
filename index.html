<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link href="./css/output.css" rel="stylesheet">
    <link href="./css/typography.css" rel="stylesheet">
    <link href="./css/variables.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>VideoBelajar - Masuk</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>
        :root {
            --primary-green: #3ECF4C;
            --secondary-bg: #FAF9F6;
        }
    </style>
</head>
<body class="bg-[#FAF9F6] font-[Lato] text-[#222325]">

    <!-- Navigation -->
    <nav class="sticky top-0 bg-white border-b border-gray-100 z-50 px-4 md:px-[120px] py-4 h-20 flex items-center justify-between">
        <a href="./Home.html" class="flex items-center">
            <img src="./css/logo.svg" alt="VideoBelajar Logo" class="h-10 md:h-12" />
        </a>
    </nav>

    <!-- Main Content Grid -->
    <main class="min-h-[calc(100vh-80px)] bg-[#FAF9F6] flex justify-center items-center py-10 px-4">
        
        <!-- Login Card -->
        <section class="w-full max-w-[590px] bg-white border border-gray-100 rounded-2xl p-6 md:p-9 shadow-md flex flex-col gap-6">
            
            <!-- Card Header -->
            <div class="text-center">
                <h1 class="text-2xl font-black text-[#222325] leading-tight">Masuk ke Akun</h1>
                <p class="text-xs md:text-sm text-gray-500 mt-1 leading-relaxed">Yuk, lanjutin belajarmu di videobelajar.</p>
            </div>

            <!-- Form -->
            <form class="flex flex-col gap-4">
                
                <!-- E-Mail -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-[#222325]">E-Mail <span class="text-red-500">*</span></label>
                    <input type="email" placeholder="Masukkan email" class="w-full px-4 py-3 text-xs md:text-sm border border-gray-300 rounded-lg outline-none focus:border-green-500 transition-colors" required />
                </div>

                <!-- Kata Sandi -->
                <div class="flex flex-col gap-1 relative">
                    <label class="text-xs font-bold text-[#222325]">Kata Sandi <span class="text-red-500">*</span></label>
                    <div class="relative w-full">
                        <input id="password" type="password" placeholder="Masukkan kata sandi" class="w-full pl-4 pr-12 py-3 text-xs md:text-sm border border-gray-300 rounded-lg outline-none focus:border-green-500 transition-colors" required />
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-400 hover:text-gray-600 focus:outline-none">
                            <span id="togglePasswordIcon" class="material-symbols-outlined text-xl select-none">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Lupa Password Link -->
                <div class="text-right">
                    <a href="#" class="text-xs font-medium text-green-500 hover:text-green-600 hover:underline">Lupa Password?</a>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col gap-3 mt-2">
                    <a href="./Home.html" class="w-full py-3 bg-[#3ECF4C] hover:bg-[#6BE26B] text-white font-bold text-xs md:text-sm rounded-lg transition-transform hover:scale-[1.01] active:scale-95 shadow-md cursor-pointer select-none text-center block">
                        Masuk
                    </a>
                    <a href="./Register.html" class="w-full py-3 bg-[#E3F9E5] hover:bg-[#D5F5D7] text-[#3ECF4C] border border-[#3ECF4C] font-bold text-xs md:text-sm rounded-lg transition-transform hover:scale-[1.01] active:scale-95 cursor-pointer select-none text-center block">
                        Daftar
                    </a>

                    
                    <div class="flex items-center my-2">
                        <div class="flex-1 border-t border-gray-200"></div>
                        <span class="px-3 text-xs text-gray-400 font-semibold select-none">atau</span>
                        <div class="flex-1 border-t border-gray-200"></div>
                    </div>

                    <button type="button" class="w-full py-3 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center justify-center gap-2 transition-transform hover:scale-[1.01] active:scale-95 cursor-pointer shadow-sm select-none">
                        <img src="./logoGoogle.svg" alt="Google" class="w-5 h-5">
                        <span class="text-xs md:text-sm font-semibold text-gray-600">Masuk dengan Google</span>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <!-- Password visibility toggler script -->
    <script>
        (function () {
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const togglePasswordIcon = document.getElementById('togglePasswordIcon');

            const bindToggle = (inputEl, buttonEl, iconEl) => {
                const state = { shown: false };

                const setShown = (shown) => {
                    state.shown = shown;
                    inputEl.type = shown ? 'text' : 'password';
                    if (iconEl) {
                        iconEl.textContent = shown ? 'visibility' : 'visibility_off';
                    }
                };

                buttonEl.addEventListener('click', () => {
                    setShown(!state.shown);
                });

                // Default hidden
                setShown(false);
            };

            if (passwordInput && togglePasswordBtn) bindToggle(passwordInput, togglePasswordBtn, togglePasswordIcon);
        })();
    </script>
</body>
</html>
